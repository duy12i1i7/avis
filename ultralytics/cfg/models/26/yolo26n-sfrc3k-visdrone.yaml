  - [-1, 1, Conv, [448, 3, 2]] # 5-P4/16
  - [-1, 1, C3k2, [448, True]]
  - [-1, 1, Conv, [896, 3, 2]] # 7-P5/32
  - [-1, 1, C3k2, [896, True]]
  - [-1, 1, SPPF, [896, 5, 3, True]]
  - [-1, 2, C2PSA, [896]]

