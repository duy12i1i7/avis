# AI-TOD-v2 tiny aerial object dataset
# Official v2 page: https://chasel-tsui.github.io/AI-TOD-v2/
# Official AI-TOD repository: https://github.com/jwwangchn/AI-TOD
#
# Important:
# AI-TOD-v2 does not ship like VisDrone as a single public zip inside Ultralytics. The official release provides
# updated annotations, while the original AI-TOD images still depend on the AI-TOD construction workflow and the xView
# training set. This spec therefore auto-converts a manually prepared raw root rather than pretending to fully
# auto-download the complete image corpus.

path: AI-TODv2
train: images/train
val: images/val

names:
  0: airplane
  1: bridge
  2: storage-tank
  3: ship
  4: swimming-pool
  5: vehicle
  6: person
  7: windmill

download: |
  import os
  from pathlib import Path

  from ultralytics.data.sfr_external import prepare_aitodv2_from_raw


  root = Path(yaml["path"])
  if (root / "images" / "train").exists() and (root / "labels" / "train").exists() and (root / "images" / "val").exists():
      pass
  else:
      raw_root = Path(os.environ.get("AITODV2_RAW_ROOT", root / "raw")).expanduser()
      if not raw_root.exists():
          raise RuntimeError(
              "AI-TOD-v2 raw sources were not found. "
              "Set AITODV2_RAW_ROOT to a prepared raw root or place it under AI-TODv2/raw. "
              "Official AI-TOD-v2 annotations: https://chasel-tsui.github.io/AI-TOD-v2/ . "
              "Official AI-TOD images/toolkit require the xView training set and the AI-TOD synthesis workflow: "
              "https://github.com/jwwangchn/AI-TOD ."
          )
      prepare_aitodv2_from_raw(raw_root, root, yaml_path=Path(yaml["yaml_file"]))
