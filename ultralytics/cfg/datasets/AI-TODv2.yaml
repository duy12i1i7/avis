# AI-TOD-v2 tiny aerial object dataset
# Official v2 page: https://chasel-tsui.github.io/AI-TOD-v2/
# Official AI-TOD repository: https://github.com/jwwangchn/AI-TOD
#
# Important:
# AI-TOD-v2 does not ship like VisDrone as a single public zip inside Ultralytics. This spec therefore automates every
# public step it can: it downloads the official AI-TOD-v2 annotations and the public AI-TOD_wo_xview assets, and if
# XVIEW_TRAIN_IMAGES plus XVIEW_GEOJSON are available it will also try to synthesize the remaining AI-TOD images via
# the official AI-TOD generation pipeline.

path: AI-TODv2
train: images/train
val: images/val

names:
  0: airplane
  1: bridge
  2: storage-tank
  3: ship
  4: swimming-pool
  5: vehicle
  6: person
  7: windmill

download: |
  import os
  from pathlib import Path

  from ultralytics.data.sfr_external import prepare_aitodv2_from_raw


  root = Path(yaml["path"])
  if (root / "images" / "train").exists() and (root / "labels" / "train").exists() and (root / "images" / "val").exists():
      pass
  else:
      raw_root = Path(os.environ.get("AITODV2_RAW_ROOT", root / "raw")).expanduser()
      raw_root.mkdir(parents=True, exist_ok=True)
      prepare_aitodv2_from_raw(raw_root, root, yaml_path=Path(yaml["yaml_file"]))
